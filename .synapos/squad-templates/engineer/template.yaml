name: engineer
displayName: "Engineer"
icon: "🧠"
domain: engineer
description: "Role genérico para feature, bug, refactor — adapta-se ao stack detectado"
version: "3.0.0"

pipeline:
  - id: investigar
    name: "Investigar"
    instruction: |
      Leia context.md e memories.md da session.

      Se context.md está vazio ou o usuário pediu algo novo que não está descrito:
      1. Entenda a intenção do usuário (ver [USER_INTENT]).
      2. Analise o código relevante (Grep/Glob/Read).
      3. Se houver ambiguidade crítica, faça no máximo 3 perguntas — em UMA só rodada.
      4. Preencha context.md com: O que é, Por que, Decisões, Não fazer.

      Se context.md já tem o essencial e a intenção cabe nele:
      - Apenas confirme a direção, não reescreva o arquivo.
      - Adicione uma linha em "## Decisões" se houver decisão nova.

      Respeite ADRs, preferências do projeto e stack.md.
    output: context.md

  - id: executar
    name: "Executar"
    instruction: |
      Execute o que foi decidido em context.md.

      Regras:
      - Edite código onde fizer sentido (Read primeiro, depois Edit/Write).
      - Inclua ou atualize testes quando a mudança exigir.
      - Siga a stack: imports, conventions e paths conforme docs/_memory/stack.md.
      - Se descobrir algo inesperado que muda o plano, pare e sinalize com `[?]`.
      - Não escreva em .synapos/ nem em docs/_memory/.

  - id: verificar
    name: "Verificar"
    instruction: |
      Rode os comandos de verify conforme docs/_memory/stack.md:
      Lint, Test, Typecheck, Build (apenas os preenchidos).

      Se algum falhar:
      - Mostre a saída.
      - Corrija (uma tentativa).
      - Re-rode.
      - Se falhar de novo, pare e escale.

      Ao final, resuma em 3 bullets:
      - O que foi feito
      - Arquivos modificados
      - O que ainda falta (se aplicável)
    gate: verify
