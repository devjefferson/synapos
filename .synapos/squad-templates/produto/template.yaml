name: produto
displayName: "Produto"
icon: "📋"
domain: produto
description: "Discovery, spec, PRD, pesquisa. Transforma ideia solta em documento acionável."
version: "3.0.0"

pipeline:
  - id: investigar
    name: "Investigar"
    instruction: |
      Leia context.md e memories.md.

      Se é pedido novo:
      1. Entenda a intenção (ver [USER_INTENT]).
      2. Mapeie: personas relevantes, jornada atual, dor identificada, métricas existentes.
      3. Perguntas (uma rodada): quem é o usuário?, qual a métrica-alvo?, qual escopo mínimo?
      4. Preencha context.md: O que é, Por que (problema), Hipótese, Não fazer.

      Respeite OKRs e pesquisa existente em docs/business/ se houver.
    output: context.md

  - id: executar
    name: "Executar"
    instruction: |
      Produza o artefato pedido (PRD, spec, one-pager, RFC de produto):

      Estrutura sugerida:
      - Problema e usuário afetado
      - Hipótese / resultado esperado
      - Escopo mínimo (o que entra, o que fica fora)
      - Critérios de aceitação
      - Métricas de sucesso
      - Riscos e dependências
      - Perguntas abertas

      Salve como arquivo na session (spec.md, prd.md, etc.) ou no diretório correto do projeto.

      `[?]` para decisões que precisam de dono de negócio.

  - id: verificar
    name: "Verificar"
    instruction: |
      Releitura crítica:
      - O problema está nomeado e é verificável?
      - Existe métrica clara de sucesso?
      - O escopo mínimo é pequeno o suficiente?
      - Os critérios de aceitação são testáveis?

      Se houver comando de lint de markdown configurado em stack.md, rode.

      Ao final, resuma:
      - Artefato produzido
      - Decisões explícitas tomadas
      - Perguntas abertas que precisam de resposta antes do engineering
    gate: verify
