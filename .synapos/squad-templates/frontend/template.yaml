name: frontend
displayName: "Frontend"
icon: "🖥️"
domain: frontend
description: "UI, componentes, estado, estilo. Adapta-se ao framework detectado (React/Vue/Svelte/etc.)"
version: "3.0.0"

pipeline:
  - id: investigar
    name: "Investigar"
    instruction: |
      Leia context.md e memories.md da session.

      Se context.md está vazio ou o usuário pediu algo novo:
      1. Entenda a intenção.
      2. Analise componentes, rotas, estado e design existentes.
      3. Se houver ambiguidade (ex: qual comportamento em mobile, estados de erro), pergunte — uma rodada só.
      4. Preencha context.md com: O que é, Por que, Decisões de UX/UI, Não fazer.

      Se context.md já está populado e a intenção cabe: apenas confirme e anote decisões novas.

      Respeite a stack (React/Vue/Svelte/etc.) detectada em stack.md.
    output: context.md

  - id: executar
    name: "Executar"
    instruction: |
      Implemente a UI decidida:
      - Componentes novos ou modificados.
      - Estilos seguindo o padrão existente (CSS modules, Tailwind, styled-components, etc.).
      - Estado local ou global conforme a arquitetura do projeto.
      - A11y básica: labels, roles, contraste, foco visível.
      - Responsividade se o design original prevê.

      Testes de componente quando a stack suporta (Vitest, Jest, Testing Library).

      Sinalize `[?]` para decisões fora do escopo (ex: nova lib de UI, mudança de design system).

  - id: verificar
    name: "Verificar"
    instruction: |
      Rode os comandos de stack.md: Lint, Typecheck, Test, Build.
      Se falhar: corrija (uma tentativa) e rode de novo.

      Ao final, resuma:
      - Componentes criados/modificados
      - Testes adicionados
      - Pontos de atenção visual (se aplicável)
    gate: verify
