name: ia-dados
displayName: "IA / Dados"
icon: "🤖"
domain: ia-dados
description: "ML, pipelines de dados, LLM apps, ETL. Foco em reprodutibilidade e qualidade de dados."
version: "3.0.0"

pipeline:
  - id: investigar
    name: "Investigar"
    instruction: |
      Leia context.md e memories.md.

      Se é pedido novo:
      1. Entenda a intenção.
      2. Mapeie: dados disponíveis, schema, volume, frequência, qualidade atual.
      3. Perguntas (uma rodada): métrica-alvo?, baseline?, latência aceitável?, custo?
      4. Preencha context.md: O que é, Por que, Decisões (modelo, arquitetura), Não fazer.

      Considere trade-offs de custo, latência e precisão.
    output: context.md

  - id: executar
    name: "Executar"
    instruction: |
      Implemente o pipeline/modelo:
      - Código reprodutível (seed fixa, requirements pinnados, versões de dados).
      - Separação clara de: ingestão, transformação, treino/inferência, avaliação.
      - Validação de schema na entrada (great_expectations, pandera, pydantic).
      - Testes de funções puras de transformação.
      - Para LLM apps: prompts versionados, fallback para erro de tool, tracing.
      - Métrica registrada em local previsível (MLflow, W&B, ou log estruturado).

      `[?]` para decisões de modelo/custo fora do escopo.

  - id: verificar
    name: "Verificar"
    instruction: |
      Rode lint/test/typecheck de stack.md.
      Se há baseline de métrica: confirme que a mudança não regrediu.
      Para LLM apps: rode suite de casos de teste se existir.
      Uma tentativa de correção.

      Ao final, resuma:
      - Pipeline/modelo alterado
      - Métricas observadas (antes/depois)
      - Considerações de custo e latência
    gate: verify
