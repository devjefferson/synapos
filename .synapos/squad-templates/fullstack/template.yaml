name: fullstack
displayName: "Squad Fullstack"
icon: "📦"
version: "1.0.0"
description: "Frontend + Backend integrados com agente de coordenação de contratos de API"

agents:
  base:
    - id: carlos-coordenador
      file: agents/carlos-coordenador.agent.md
      displayName: "Carlos Coordenador"
      icon: "🔗"
      role: "Coordenador Fullstack"
    - id: ana-arquitetura-fe
      file: ../frontend/agents/ana-arquitetura-fe.agent.md
      displayName: "Ana Arquitetura"
      icon: "🏗️"
      role: "Arquiteta Frontend"
    - id: rodrigo-react
      file: ../frontend/agents/rodrigo-react.agent.md
      displayName: "Rodrigo React"
      icon: "⚛️"
      role: "Dev Frontend"
    - id: bruno-base
      file: ../backend/agents/bruno-base.agent.md
      displayName: "Bruno Base"
      icon: "🏗️"
      role: "Arquiteto Backend"
    - id: alexandre-api
      file: ../backend/agents/alexandre-api.agent.md
      displayName: "Alexandre API"
      icon: "⚙️"
      role: "Dev Backend"
  optional:
    - id: ursula-ui
      file: ../frontend/agents/ursula-ui.agent.md
      displayName: "Úrsula UI"
      icon: "🎨"
      role: "UX/UI Designer"
    - id: tiago-testes-fe
      file: ../frontend/agents/tiago-testes-fe.agent.md
      displayName: "Tiago Testes"
      icon: "🧪"
      role: "Engenheiro de Testes"
    - id: sergio-seguranca
      file: ../backend/agents/sergio-seguranca.agent.md
      displayName: "Sérgio Segurança"
      icon: "🔒"
      role: "Engenheiro de Segurança"
    - id: renata-revisao-fe
      file: ../frontend/agents/renata-revisao-fe.agent.md
      displayName: "Renata Revisão"
      icon: "🔍"
      role: "Reviewer Frontend"
    - id: roberto-revisao-be
      file: ../backend/agents/roberto-revisao-be.agent.md
      displayName: "Roberto Revisão"
      icon: "🔎"
      role: "Reviewer Backend"

pipelines:
  default: integration-feature
  available:
    - id: integration-feature
      name: "Feature Fullstack Integrada"
      description: "Contrato API → Checkpoint → Frontend → Backend → Integração → Review"
      file: pipelines/integration-feature.yaml
    - id: bug-fix
      name: "Correção de Bug"
      description: "Diagnóstico → Fix (FE/BE) → Integração → Review"
      file: pipelines/bug-fix.yaml

performance_modes:
  alta:
    description: "Coordenação completa, frontend e backend em paralelo, segurança, testes e review duplo"
    agents: all
  economico:
    description: "Coordenador + dev frontend + dev backend + review — ideal para features pequenas"
    agents:
      - carlos-coordenador
      - rodrigo-react
      - alexandre-api
      - renata-revisao-fe
