name: fullstack
displayName: "Fullstack"
icon: "📦"
domain: fullstack
description: "Features integradas front + back. Pensa no contrato ponta a ponta."
version: "3.0.0"

pipeline:
  - id: investigar
    name: "Investigar"
    instruction: |
      Leia context.md e memories.md da session.

      Se é pedido novo:
      1. Entenda a intenção (ver [USER_INTENT]).
      2. Mapeie front (UI, estado) E back (endpoints, schema) envolvidos.
      3. Perguntas (uma rodada): contratos, formatos de resposta, tratamento de erro no front, loading/empty states.
      4. Preencha context.md: O que é, Por que, Decisões (front + back), Não fazer.

      Respeite ADRs, stack.md e convenções do monorepo/repo.
    output: context.md

  - id: executar
    name: "Executar"
    instruction: |
      Implemente ponta a ponta:
      - Backend: endpoint + validação + auth + migration (se houver) + teste.
      - Frontend: componente/tela + fetch/mutation + estados (loading/error/empty) + teste.
      - Contrato único: um tipo compartilhado ou espelhado fielmente entre os lados.
      - Tratamento de erro coerente: 4xx no back vira mensagem útil no front.

      `[?]` para decisões que afetam escopo (ex: adicionar cache, mudar formato de resposta).

  - id: verificar
    name: "Verificar"
    instruction: |
      Rode lint, typecheck, test, build tanto no front quanto no back (conforme stack.md).
      Teste manualmente o fluxo ponta a ponta se o projeto tem ambiente local rodando.
      Uma tentativa de correção.

      Ao final, resuma:
      - Endpoints + componentes tocados
      - Contrato compartilhado (se criado)
      - Pontos de teste manual recomendados
    gate: verify
