name: mobile
displayName: "Mobile"
icon: "📱"
domain: mobile
description: "Apps iOS/Android — React Native, Flutter, Swift, Kotlin. Adapta-se ao stack detectado."
version: "3.0.0"

pipeline:
  - id: investigar
    name: "Investigar"
    instruction: |
      Leia context.md e memories.md.

      Se é pedido novo:
      1. Entenda a intenção.
      2. Mapeie: tela(s) envolvida(s), navegação, estado, permissões nativas.
      3. Perguntas (uma rodada): iOS vs Android divergem?, offline-first?, permissões solicitadas?
      4. Preencha context.md: O que é, Por que, Decisões (UX + nativas), Não fazer.

      Respeite ADRs e stack.md (RN / Flutter / Swift / Kotlin).
    output: context.md

  - id: executar
    name: "Executar"
    instruction: |
      Implemente a tela/feature:
      - Componentes seguindo o design system do projeto.
      - Navegação usando o stack de nav do projeto (React Navigation, GoRouter, SwiftUI NavStack, etc.).
      - Estado persistente quando faz sentido (AsyncStorage, SharedPreferences, UserDefaults).
      - Permissões nativas declaradas e solicitadas corretamente.
      - A11y (labels, traits, semanticsLabel).
      - Testes quando a stack comporta.

      `[?]` para decisões fora do escopo (ex: nova lib nativa, mudança de min SDK).

  - id: verificar
    name: "Verificar"
    instruction: |
      Rode lint/test/typecheck do stack.md.
      Build: se houver comando de build mobile configurado, rode. Senão, apenas o JS/Dart build.
      Uma tentativa de correção.

      Ao final, resuma:
      - Telas/componentes tocados
      - Permissões ou configs nativas alteradas
      - Pontos de teste manual em device/emulador
    gate: verify
