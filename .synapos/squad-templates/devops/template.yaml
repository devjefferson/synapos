name: devops
displayName: "DevOps"
icon: "🚀"
domain: devops
description: "CI/CD, containers, deploy, infra-as-code, observabilidade."
version: "3.0.0"

pipeline:
  - id: investigar
    name: "Investigar"
    instruction: |
      Leia context.md e memories.md.

      Se é pedido novo:
      1. Entenda a intenção.
      2. Mapeie: CI atual, Dockerfile, IaC, observabilidade existente, cloud provider.
      3. Perguntas (uma rodada): ambiente alvo?, SLA?, segredos?, rollback strategy?
      4. Preencha context.md: O que é, Por que, Decisões (infra), Não fazer.

      Respeite políticas de compliance e segurança do projeto.
    output: context.md

  - id: executar
    name: "Executar"
    instruction: |
      Implemente a mudança de infra/CI:
      - Dockerfile, compose ou manifesto k8s conforme necessidade.
      - Workflow de CI (GitHub Actions, GitLab CI, etc.) seguindo o padrão do projeto.
      - IaC (Terraform, Pulumi, CDK) se aplicável.
      - Segredos via vault/secret manager — nunca em plaintext.
      - Logs estruturados e métricas mínimas expostas.
      - Documentação das variáveis de ambiente necessárias.

      `[?]` para decisões que afetam custo, segurança ou SLA.

  - id: verificar
    name: "Verificar"
    instruction: |
      Rode validação local dos manifestos/workflows quando possível:
      - `docker build` para imagens.
      - `terraform validate` / `terraform plan` (sem apply) para IaC.
      - Lint de workflow (actionlint, etc.) se disponível.
      - Comandos de stack.md aplicáveis.

      Uma tentativa de correção. Nunca faça apply/deploy de produção sem aprovação do usuário.

      Ao final, resuma:
      - Arquivos de infra criados/modificados
      - Segredos novos necessários
      - Passos manuais restantes (apply, rotação, etc.)
    gate: verify
