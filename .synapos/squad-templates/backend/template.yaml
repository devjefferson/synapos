name: backend
displayName: "Backend"
icon: "⚙️"
domain: backend
description: "APIs, banco de dados, auth, segurança. Adapta-se ao framework detectado (Node/Python/Go/Rust/etc.)"
version: "3.0.0"

pipeline:
  - id: investigar
    name: "Investigar"
    instruction: |
      Leia context.md e memories.md da session.

      Se context.md está vazio ou é pedido novo:
      1. Entenda a intenção (ver [USER_INTENT]).
      2. Mapeie: endpoints existentes, schemas de banco, auth, autorização relevantes.
      3. Perguntas críticas (uma rodada): contratos de API, validação, consistência, impacto em clientes.
      4. Preencha context.md: O que é, Por que, Decisões de API/schema, Não fazer.

      Se já está populado: confirme e adicione decisões novas.

      Respeite ADRs, stack.md e convenções do projeto.
    output: context.md

  - id: executar
    name: "Executar"
    instruction: |
      Implemente o backend:
      - Endpoints com validação de input (zod/pydantic/joi/etc. conforme stack).
      - Autenticação e autorização onde a rota exige.
      - Migrations de banco seguindo o padrão (Prisma, Alembic, TypeORM, sqlx, etc.).
      - Tratamento de erro explícito com códigos HTTP corretos.
      - Logs estruturados em pontos críticos.
      - Testes de integração cobrindo happy path e pelo menos um erro.

      `[?]` para decisões fora do escopo (ex: nova dependência, mudança de schema retrocompatível).

  - id: verificar
    name: "Verificar"
    instruction: |
      Rode os comandos de stack.md: Lint, Typecheck, Test, Build.
      Migrations: rode contra um banco de teste se o projeto tiver configuração.
      Uma tentativa de correção. Se falhar de novo, escale.

      Ao final, resuma:
      - Endpoints adicionados/modificados
      - Mudanças de schema (se houver)
      - Considerações de segurança (se aplicável)
    gate: verify
