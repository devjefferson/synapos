name: "Pré-Execução: Investigação + Arquitetura + Planejamento"
description: "Pipeline universal de preparação. Roda antes de qualquer pipeline principal de qualquer squad. Gera context.md, architecture.md e plan.md que são injetados automaticamente na execução principal."
version: "1.0.0"

# agent_override: quando definido em squad.yaml como pre_pipeline.agent,
# sobrescreve {lead_agent} para usar o agente do squad em vez de leo-engenheiro.
# Se não definido, o runner usa leo-engenheiro se disponível, senão usa o primeiro agent base do squad.
agent_override: "{lead_agent}"

# Arquivos salvos em: docs/.squads/sessions/{feature-slug}/
session_files:
  context: context.md
  architecture: architecture.md
  plan: plan.md

steps:
  - id: pre-01-gate
    name: "Verificação de Integridade"
    execution: checkpoint
    gate: GATE-0
    file: ../../squad-templates/engineer/pipeline/steps/01-gate.md

  - id: pre-02-preparacao
    name: "Preparação"
    agent: "{lead_agent}"
    execution: inline
    model_tier: fast
    file: ../../squad-templates/engineer/pipeline/steps/02-preparacao.md
    depends_on: [pre-01-gate]

  - id: pre-03-investigacao
    name: "Investigação"
    agent: "{lead_agent}"
    execution: inline
    model_tier: powerful
    file: ../../squad-templates/engineer/pipeline/steps/03-investigacao.md
    depends_on: [pre-02-preparacao]
    output_files:
      - context.md
    veto_conditions:
      - "context.md sem seção de Motivação preenchida"
      - "context.md sem Meta mensurável"
      - "context.md sem seção de ADRs Relevantes"

  - id: pre-04-checkpoint-contexto
    name: "Aprovação do Contexto"
    execution: checkpoint
    gate: GATE-2
    file: ../../squad-templates/engineer/pipeline/steps/04-checkpoint-contexto.md
    depends_on: [pre-03-investigacao]

  - id: pre-05-arquitetura
    name: "Estruturação Arquitetural"
    agent: "{lead_agent}"
    execution: subagent
    model_tier: powerful
    file: ../../squad-templates/engineer/pipeline/steps/05-arquitetura.md
    depends_on: [pre-04-checkpoint-contexto]
    output_files:
      - architecture.md
    veto_conditions:
      - "architecture.md sem seção de Verificação de Consistência"
      - "architecture.md sem lista de ADRs Aplicadas"
      - "architecture.md sem lista de arquivos a modificar/criar"

  - id: pre-05b-visual-spec
    name: "Especificação Visual (condicional)"
    agent: "{lead_agent}"
    execution: inline
    model_tier: powerful
    file: ../../squad-templates/engineer/pipeline/steps/visual-spec.md
    depends_on: [pre-05-arquitetura]
    output_files:
      - visual-spec.md
    veto_conditions:
      - "visual-spec.md sem seção de Verificação GATE-DESIGN"
      - "Componente interativo sem estado focus ou error"
      - "Contraste não declarado para nenhum componente com texto"
    skip_condition: "Nenhum agent do squad tem tasks de design-system, component-spec ou ux-review"

  - id: pre-06-checkpoint-arquitetura
    name: "Aprovação da Arquitetura"
    execution: checkpoint
    gate: GATE-ADR
    # GATE-DESIGN também é verificado neste checkpoint quando visual-spec.md foi gerado
    file: ../../squad-templates/engineer/pipeline/steps/06-checkpoint-arquitetura.md
    depends_on: [pre-05b-visual-spec]

  - id: pre-07-planejamento
    name: "Planejamento de Execução"
    agent: "{lead_agent}"
    execution: subagent
    model_tier: powerful
    file: ../../squad-templates/engineer/pipeline/steps/07-planejamento.md
    depends_on: [pre-06-checkpoint-arquitetura]
    output_files:
      - plan.md
    veto_conditions:
      - "plan.md sem agents/skills atribuídos por fase"
      - "Alguma fase excede estimativa de 2h sem justificativa"
      - "plan.md sem referência a context.md e architecture.md"

  - id: pre-08-checkpoint-plano
    name: "Aprovação do Plano"
    execution: checkpoint
    file: ../../squad-templates/engineer/pipeline/steps/08-checkpoint-plano.md
    depends_on: [pre-07-planejamento]
